<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join a group · Lemon Split</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, #1FA04E 0%, #122e21 100%); color: #fff; padding: 24px;
  }
  .card {
    max-width: 380px; width: 100%; text-align: center;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px; padding: 32px 26px; backdrop-filter: blur(6px);
  }
  .badge { width: 84px; height: 84px; border-radius: 22px; background: #fff; display: inline-flex;
    align-items: center; justify-content: center; font-size: 44px; margin-bottom: 18px; }
  h1 { font-size: 22px; margin: 0 0 8px; letter-spacing: -0.4px; }
  p { margin: 0 0 22px; color: #e6f3ea; line-height: 1.55; font-size: 15px; }
  .btn { display: block; width: 100%; padding: 15px; border-radius: 14px; font-weight: 700;
    font-size: 15px; text-decoration: none; margin-top: 10px; }
  .primary { background: #fff; color: #12351f; }
  .ghost { background: rgba(255,255,255,0.12); color: #fff; }
  .fine { margin-top: 18px; font-size: 12.5px; color: #bfe0cb; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">🍋</div>
    <h1>You're invited to a group</h1>
    <p>Join on <strong>Lemon Split</strong> to split and settle shared expenses with friends.</p>
    <a class="primary btn" id="store" href="https://play.google.com/store/apps/details?id=in.lemonsplit.app">Get the app</a>
    <a class="ghost btn" id="open" href="#">Open in Lemon Split</a>
    <div class="fine">Have the app already? It should open automatically. If not, tap “Open in Lemon Split”.</div>
  </div>
  <script>
    // Preserve the invite token so both buttons carry it through.
    var token = new URLSearchParams(location.search).get('g') || '';
    var open = document.getElementById('open');
    // Re-trigger the app link (the app intercepts verified links to itself).
    open.href = 'https://bhupendrarana.github.io/join?g=' + encodeURIComponent(token);
  </script>
</body>
</html>
